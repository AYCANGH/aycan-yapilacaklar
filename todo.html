<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .header p {
      margin-top: 4px;
      font-size: 0.875rem;
      opacity: 0.8;
    }

    .input-area {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filters {
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      transition: background 0.15s;
    }

    .todo-item:hover {
      background: #f9fafb;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-word;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .todo-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      color: #d1d5db;
    }

    .edit-btn:hover {
      color: #4f46e5;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .todo-edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }

    .empty {
      text-align: center;
      padding: 32px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #6b7280;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AYCAN YAPILACAKLAR</h1>
      <p id="date"></p>
    </div>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="Yeni görev ekle..." maxlength="120">
      <button onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Aktif</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div class="footer">
      <span id="remaining"></span>
      <button class="clear-btn" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://vgtlvrgqbdwuvnehyeua.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndGx2cmdxYmR3dXZuZWh5ZXVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwODgsImV4cCI6MjA5MjI4NTA4OH0.7iMS4YKH0t7t0NLQgN_XBkaTyMPwJqC5LyaJYW_PA_M';

    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation'
    };

    let todos = [];
    let filter = 'all';

    function updateDateTime() {
      const now = new Date();
      const date = now.toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const time = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('date').textContent = `${date} — ${time}`;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    async function fetchTodos() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/todos?order=created_at.desc`, { headers });
      todos = await res.json();
      render();
    }

    async function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      await fetch(`${SUPABASE_URL}/rest/v1/todos`, {
        method: 'POST',
        headers,
        body: JSON.stringify({ text, done: false })
      });
      await fetchTodos();
    }

    async function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
        method: 'PATCH',
        headers,
        body: JSON.stringify({ done: !todo.done })
      });
      await fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
        method: 'DELETE',
        headers
      });
      await fetchTodos();
    }

    async function clearDone() {
      await fetch(`${SUPABASE_URL}/rest/v1/todos?done=eq.true`, {
        method: 'DELETE',
        headers
      });
      await fetchTodos();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Görev yok</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="todo-item" id="item-${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
            <span class="todo-text ${t.done ? 'done' : ''}" ondblclick="startEdit(${t.id})">${escapeHtml(t.text)}</span>
            <div class="todo-actions">
              <button class="edit-btn" onclick="startEdit(${t.id})" title="Düzenle">&#x270E;</button>
              <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Sil">&#x2715;</button>
            </div>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('remaining').textContent = `${remaining} görev kaldı`;
    }

    function startEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo || todo.done) return;
      const item = document.getElementById('item-' + id);
      const span = item.querySelector('.todo-text');
      const actions = item.querySelector('.todo-actions');

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'todo-edit-input';
      input.value = todo.text;
      input.maxLength = 120;

      span.replaceWith(input);
      actions.innerHTML = `
        <button class="edit-btn" style="color:#22c55e" onclick="saveEdit(${id})" title="Kaydet">&#x2713;</button>
        <button class="delete-btn" onclick="cancelEdit(${id})" title="İptal">&#x2715;</button>
      `;
      input.focus();
      input.select();
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEdit(id);
        if (e.key === 'Escape') cancelEdit(id);
      });
    }

    async function saveEdit(id) {
      const input = document.querySelector(`#item-${id} .todo-edit-input`);
      if (!input) return;
      const text = input.value.trim();
      if (text) {
        await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
          method: 'PATCH',
          headers,
          body: JSON.stringify({ text })
        });
      }
      await fetchTodos();
    }

    function cancelEdit(id) {
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    fetchTodos();
  </script>
</body>
</html>
