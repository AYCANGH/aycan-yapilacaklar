<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AYCAN YAPILACAKLAR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .header-left h1 { font-size: 1.5rem; font-weight: 700; }
    .header-left p { margin-top: 4px; font-size: 0.875rem; opacity: 0.8; }

    #logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.35); }

    /* AUTH EKRANI */
    .auth-box {
      padding: 32px 28px;
    }

    .auth-box h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
    }

    .auth-box p.sub {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: #4f46e5;
      color: #fff;
      font-weight: 600;
    }

    .auth-field {
      margin-bottom: 16px;
    }

    .auth-field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .auth-field input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-field input:focus { border-color: #4f46e5; }

    .auth-submit {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .auth-submit:hover { background: #4338ca; }
    .auth-submit:disabled { background: #a5b4fc; cursor: not-allowed; }

    .auth-msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }

    .auth-msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
    .auth-msg.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .auth-msg.info    { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; display: block; }

    /* TODO EKRANI */
    .input-area {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f46e5; }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #4338ca; }

    .filters {
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list { list-style: none; padding: 8px 0; min-height: 60px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      transition: background 0.15s;
    }

    .todo-item:hover { background: #f9fafb; }

    .todo-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #4f46e5;
      cursor: pointer; flex-shrink: 0;
    }

    .todo-text {
      flex: 1; font-size: 0.95rem;
      color: #111827; word-break: break-word;
    }

    .todo-text.done { text-decoration: line-through; color: #9ca3af; }

    .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .edit-btn, .delete-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; padding: 2px 6px;
      border-radius: 4px; transition: color 0.2s; color: #d1d5db;
    }

    .edit-btn:hover { color: #4f46e5; }
    .delete-btn:hover { color: #ef4444; }

    .todo-edit-input {
      flex: 1; padding: 4px 8px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px; font-size: 0.95rem; outline: none;
    }

    .empty {
      text-align: center; padding: 32px;
      color: #9ca3af; font-size: 0.9rem;
    }

    .footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #6b7280;
    }

    .clear-btn {
      background: none; border: none;
      color: #ef4444; font-size: 0.82rem;
      cursor: pointer; padding: 0;
    }

    .clear-btn:hover { text-decoration: underline; }

    #todo-screen { display: none; }
    #auth-screen { display: block; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>AYCAN YAPILACAKLAR</h1>
      <p id="date"></p>
    </div>
    <button id="logout-btn" style="display:none" onclick="logout()">Çıkış Yap</button>
  </div>

  <!-- AUTH EKRANI -->
  <div id="auth-screen">
    <div class="auth-box">
      <h2>Hoş Geldiniz</h2>
      <p class="sub">Devam etmek için giriş yapın veya kayıt olun.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Giriş Yap</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Kayıt Ol</button>
      </div>

      <div class="auth-field">
        <label>E-posta</label>
        <input type="email" id="auth-email" placeholder="ornek@mail.com">
      </div>
      <div class="auth-field">
        <label>Şifre</label>
        <input type="password" id="auth-password" placeholder="En az 6 karakter" onkeydown="if(event.key==='Enter') authSubmit()">
      </div>

      <button class="auth-submit" id="auth-btn" onclick="authSubmit()">Giriş Yap</button>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>

  <!-- TODO EKRANI -->
  <div id="todo-screen">
    <div class="input-area">
      <input type="text" id="todo-input" placeholder="Yeni görev ekle..." maxlength="120">
      <button onclick="addTodo()">Ekle</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Aktif</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Tamamlanan</button>
    </div>
    <ul class="todo-list" id="todo-list"></ul>
    <div class="footer">
      <span id="remaining"></span>
      <button class="clear-btn" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://vgtlvrgqbdwuvnehyeua.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndGx2cmdxYmR3dXZuZWh5ZXVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwODgsImV4cCI6MjA5MjI4NTA4OH0.7iMS4YKH0t7t0NLQgN_XBkaTyMPwJqC5LyaJYW_PA_M';
  const REDIRECT_URL = 'https://aycangh.github.io/aycan-yapilacaklar/';

  let session = null;
  let todos = [];
  let filter = 'all';
  let currentTab = 'login';

  // --- SAAT ---
  function updateDateTime() {
    const now = new Date();
    const date = now.toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const time = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('date').textContent = `${date} — ${time}`;
  }
  updateDateTime();
  setInterval(updateDateTime, 1000);

  // --- AUTH HELPERS ---
  function authHeaders(token) {
    return {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${token || SUPABASE_KEY}`
    };
  }

  function showMsg(text, type) {
    const el = document.getElementById('auth-msg');
    el.textContent = text;
    el.className = 'auth-msg ' + type;
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('auth-btn').textContent = tab === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
    document.getElementById('auth-msg').className = 'auth-msg';
    document.getElementById('auth-msg').textContent = '';
  }

  async function authSubmit() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    if (!email || !password) { showMsg('E-posta ve şifre zorunludur.', 'error'); return; }

    const btn = document.getElementById('auth-btn');
    btn.disabled = true;
    btn.textContent = 'Lütfen bekleyin...';

    if (currentTab === 'register') {
      await register(email, password);
    } else {
      await login(email, password);
    }

    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
  }

  async function register(email, password) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup?redirect_to=${encodeURIComponent(REDIRECT_URL)}`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      showMsg(data.msg || data.error_description || 'Kayıt başarısız.', 'error');
      return;
    }

    // Kullanıcı zaten varsa
    if (data.id && data.identities && data.identities.length === 0) {
      showMsg('Bu e-posta ile zaten kayıt var. Giriş yapmayı deneyin.', 'error');
      return;
    }

    showMsg('Kayıt başarılı! E-postanıza gelen onay bağlantısına tıklayın.', 'success');
  }

  async function login(email, password) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      const msg = data.error_description || data.msg || '';
      if (msg.includes('Email not confirmed')) {
        showMsg('E-postanızı onaylamadan giriş yapamazsınız. Lütfen gelen kutunuzu kontrol edin.', 'info');
      } else if (msg.includes('Invalid login')) {
        showMsg('E-posta veya şifre hatalı.', 'error');
      } else {
        showMsg(msg || 'Giriş başarısız.', 'error');
      }
      return;
    }

    saveSession(data);
    showApp();
  }

  async function logout() {
    if (session) {
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method: 'POST',
        headers: authHeaders(session.access_token)
      });
    }
    clearSession();
    showAuthScreen();
  }

  function saveSession(data) {
    session = { access_token: data.access_token, refresh_token: data.refresh_token };
    localStorage.setItem('sb_session', JSON.stringify(session));
  }

  function clearSession() {
    session = null;
    localStorage.removeItem('sb_session');
  }

  async function refreshSession() {
    const stored = localStorage.getItem('sb_session');
    if (!stored) return false;
    const s = JSON.parse(stored);

    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ refresh_token: s.refresh_token })
    });
    if (!res.ok) { clearSession(); return false; }
    const data = await res.json();
    saveSession(data);
    return true;
  }

  // E-posta onay linkinden dönen token'ı URL hash'ten al
  async function handleHashTokens() {
    const hash = window.location.hash.substring(1);
    if (!hash) return false;
    const params = new URLSearchParams(hash);
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    const type = params.get('type');

    if (access_token && (type === 'signup' || type === 'recovery' || type === 'magiclink')) {
      saveSession({ access_token, refresh_token });
      // Hash'i URL'den temizle
      history.replaceState(null, '', window.location.pathname);
      return true;
    }
    return false;
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('todo-screen').style.display = 'block';
    document.getElementById('logout-btn').style.display = 'block';
    fetchTodos();
  }

  function showAuthScreen() {
    document.getElementById('auth-screen').style.display = 'block';
    document.getElementById('todo-screen').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
  }

  // --- UYGULAMA BAŞLAT ---
  async function init() {
    const fromEmail = await handleHashTokens();
    if (fromEmail) { showApp(); return; }

    const ok = await refreshSession();
    if (ok) { showApp(); return; }

    showAuthScreen();
  }

  // --- TODO FONKSİYONLARI ---
  function todoHeaders() {
    return {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${session.access_token}`,
      'Prefer': 'return=representation'
    };
  }

  async function fetchTodos() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/todos?order=created_at.desc`, { headers: todoHeaders() });
    if (res.status === 401) { clearSession(); showAuthScreen(); return; }
    todos = await res.json();
    render();
  }

  document.getElementById('todo-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  async function addTodo() {
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await fetch(`${SUPABASE_URL}/rest/v1/todos`, {
      method: 'POST',
      headers: todoHeaders(),
      body: JSON.stringify({ text, done: false })
    });
    await fetchTodos();
  }

  async function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
      method: 'PATCH',
      headers: todoHeaders(),
      body: JSON.stringify({ done: !todo.done })
    });
    await fetchTodos();
  }

  async function deleteTodo(id) {
    await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
      method: 'DELETE',
      headers: todoHeaders()
    });
    await fetchTodos();
  }

  async function clearDone() {
    await fetch(`${SUPABASE_URL}/rest/v1/todos?done=eq.true`, {
      method: 'DELETE',
      headers: todoHeaders()
    });
    await fetchTodos();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('todo-list');
    const filtered = todos.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">Görev yok</div>';
    } else {
      list.innerHTML = filtered.map(t => `
        <li class="todo-item" id="item-${t.id}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
          <span class="todo-text ${t.done ? 'done' : ''}" ondblclick="startEdit(${t.id})">${escapeHtml(t.text)}</span>
          <div class="todo-actions">
            <button class="edit-btn" onclick="startEdit(${t.id})" title="Düzenle">&#x270E;</button>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Sil">&#x2715;</button>
          </div>
        </li>
      `).join('');
    }

    const remaining = todos.filter(t => !t.done).length;
    document.getElementById('remaining').textContent = `${remaining} görev kaldı`;
  }

  function startEdit(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo || todo.done) return;
    const item = document.getElementById('item-' + id);
    const span = item.querySelector('.todo-text');
    const actions = item.querySelector('.todo-actions');

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'todo-edit-input';
    input.value = todo.text;
    input.maxLength = 120;

    span.replaceWith(input);
    actions.innerHTML = `
      <button class="edit-btn" style="color:#22c55e" onclick="saveEdit(${id})" title="Kaydet">&#x2713;</button>
      <button class="delete-btn" onclick="cancelEdit()" title="İptal">&#x2715;</button>
    `;
    input.focus();
    input.select();
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveEdit(id);
      if (e.key === 'Escape') cancelEdit();
    });
  }

  async function saveEdit(id) {
    const input = document.querySelector(`#item-${id} .todo-edit-input`);
    if (!input) return;
    const text = input.value.trim();
    if (text) {
      await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
        method: 'PATCH',
        headers: todoHeaders(),
        body: JSON.stringify({ text })
      });
    }
    await fetchTodos();
  }

  function cancelEdit() { render(); }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
