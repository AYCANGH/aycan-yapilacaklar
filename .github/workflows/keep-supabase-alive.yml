name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 */3 * *'  # Her 3 günde bir, saat 09:00 UTC
  workflow_dispatch:        # Manuel de tetiklenebilir

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://vgtlvrgqbdwuvnehyeua.supabase.co/rest/v1/todos?limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndGx2cmdxYmR3dXZuZWh5ZXVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwODgsImV4cCI6MjA5MjI4NTA4OH0.7iMS4YKH0t7t0NLQgN_XBkaTyMPwJqC5LyaJYW_PA_M" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndGx2cmdxYmR3dXZuZWh5ZXVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwODgsImV4cCI6MjA5MjI4NTA4OH0.7iMS4YKH0t7t0NLQgN_XBkaTyMPwJqC5LyaJYW_PA_M")
          echo "Supabase yanıt kodu: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase aktif."
          else
            echo "❌ Beklenmeyen yanıt: $STATUS"
            exit 1
          fi
